name: deploy.yml
on:
    push:
        branches: [ "main" ]
jobs:
    deploy:
        name: Deploy app
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Install Flyctl
              uses: superfly/flyctl-actions/setup-flyctl@master

            - name: Deploy
              run: flyctl deploy --remote-only --yes
              env:
                  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
